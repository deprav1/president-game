<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/favicon_eagle.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Сатирическая карточная игра о власти: управляйте Варонией, балансируйте группы влияния и переживите два срока." />
    <meta name="theme-color" content="#100d06" />
    <title>Варония</title>

    <!-- Шрифты: preconnect + урезанные веса. Вынесено из CSS @import,
         чтобы не блокировать парсинг стилей. display=swap убирает FOIT. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:wght@700;900&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph / Telegram / Social Media -->
    <meta property="og:title" content="Варония - президентский симулятор" />
    <meta property="og:description" content="Удержите власть в вымышленном государстве. Балансируйте между армией, олигархами, народом и Западом." />
    <meta property="og:image" content="https://cb077728.tw1.ru/images/og_share.png" />
    <meta property="og:url" content="https://cb077728.tw1.ru/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Yandex Metrica загружается из src/lib/analytics.js без inline-скрипта,
         чтобы production CSP мог не разрешать 'unsafe-inline' для script-src. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
