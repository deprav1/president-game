<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/favicon_eagle.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Варония</title>

    <!-- Шрифты: preconnect + урезанные веса. Вынесено из CSS @import,
         чтобы не блокировать парсинг стилей. display=swap убирает FOIT. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:wght@700;900&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph / Telegram / Social Media -->
    <meta property="og:title" content="Варония — Симулятор Автократа" />
    <meta property="og:description" content="Удержите власть в вымышленном государстве. Балансируйте между армией, олигархами, народом и Западом." />
    <meta property="og:image" content="/images/og_share.png" />
    <meta property="og:type" content="website" />
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Yandex Metrica. Counter id подставляется Vite из VITE_YM_ID.
         Если переменная не задана (dev без счётчика) — инициализация
         пропускается, аналитика становится тихим no-op. -->
    <script>
      (function () {
        var YM_ID = "%VITE_YM_ID%";
        if (!YM_ID || YM_ID.indexOf("%") === 0) return;
        (function (m, e, t, r, i, k, a) {
          m[i] = m[i] || function () { (m[i].a = m[i].a || []).push(arguments); };
          m[i].l = 1 * new Date();
          for (var j = 0; j < document.scripts.length; j++) { if (document.scripts[j].src === r) { return; } }
          k = e.createElement(t); a = e.getElementsByTagName(t)[0];
          k.async = 1; k.src = r; a.parentNode.insertBefore(k, a);
        })(window, document, "script", "https://mc.yandex.ru/metrika/tag.js", "ym");
        window.ym(Number(YM_ID), "init", {
          clickmap: true,
          trackLinks: true,
          accurateTrackBounce: true,
          webvisor: true,
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
