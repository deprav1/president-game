name: Deploy to Timeweb

on:
  push:
    branches:
      - main

concurrency:
  group: 'timeweb'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Timeweb via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Веб-корень Timeweb — папка public_html (см. доку Timeweb).
          # Для основного сайта: ./public_html/
          # Для доп. сайта: ./ИМЯ-САЙТА/public_html/
          server-dir: ./public_html/
          # Чистим public_html перед заливкой, чтобы убрать дефолтную
          # заглушку Timeweb (index.php/index.html), перебивающую игру.
          dangerous-clean-slate: true
