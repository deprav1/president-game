name: Deploy to Timeweb

on:
  push:
    branches:
      - main

concurrency:
  group: 'timeweb'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        # ID счётчика Yandex Metrica не секрет (виден в исходниках страницы),
        # поэтому задаём его прямо здесь. .env локальный и в репозиторий не
        # коммитится, так что прод-сборка должна получить ID отсюда.
        env:
          VITE_YM_ID: "109695119"
          # Глобальная таблица рекордов: same-origin PHP-endpoint на том же
          # хостинге (public/api/leaderboard.php). Данные хранятся вне webroot,
          # поэтому переживают деплой. Пусто — глобальный рейтинг выключен.
          VITE_LEADERBOARD_ENDPOINT: "/api/leaderboard.php"
          # Серверный сбор игровой аналитики (same-origin PHP на том же хостинге).
          # collect.php копит скользящий агрегат в lb-data; dashboard.php отдаёт
          # сводку в админ-панель под токеном (lb-data/analytics-token.txt).
          # Явный dashboard задаём, т.к. авто-вывод из endpoint не сматчит «.php».
          VITE_ANALYTICS_ENDPOINT: "/api/collect.php"
          VITE_ANALYTICS_DASHBOARD: "/api/dashboard.php"
          # Безопасный режим (скрыт от игроков): собирает билд без рекламы VPN
          # «Наружу» — например, для модерации Яндекс.Директа.
          # Закомментируйте, чтобы вернуть обычный билд с рекламой.
          # VITE_SAFE_MODE: "1"
        run: npm run build

      - name: Deploy to Timeweb via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || secrets.FTP_SERVER }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME || secrets.FTP_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          # Секреты активации (в репозиторий НЕ попадают, живут в GitHub Secrets):
          #  BOT_TOKEN       — токен @varonia_bot → включает проверку подписи топа;
          #  ANALYTICS_TOKEN — секрет для чтения дашборда аналитики (?atoken=…).
          # Пусто — соответствующая проверка в мягком/закрытом режиме (ничего не ломается).
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ANALYTICS_TOKEN: ${{ secrets.ANALYTICS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_HOST}" ] || [ -z "${SSH_USERNAME}" ] || [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "::error::Set SSH_HOST, SSH_USERNAME and SSH_PRIVATE_KEY repository secrets."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/timeweb_deploy_key
          chmod 600 ~/.ssh/timeweb_deploy_key

          # Таймауты: зависшее SSH-соединение (Timeweb иногда придушивает) должно
          # падать за ~60с, а не висеть до общего таймаута job'а.
          SSH_TIMEOUTS="-o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          SSH_OPTS="-p ${SSH_PORT} -i ~/.ssh/timeweb_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new ${SSH_TIMEOUTS}"
          SCP_OPTS="-P ${SSH_PORT} -i ~/.ssh/timeweb_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new ${SSH_TIMEOUTS}"

          # Токены активации кладём в dist/lb-data ДО архивации — уедут тем же
          # архивом и ОДНИМ SSH-подключением (несколько быстрых SSH подряд Timeweb
          # придушивает → деплой зависал). В репозиторий не попадают: пишутся из
          # секретов прямо на раннере. Пустой секрет → файл не создаём (проверка
          # остаётся выкл). На сервере `cp -a` смёржит их в public_html/lb-data,
          # сохранив данные доски (JSON доски мы из очистки исключаем).
          mkdir -p dist/lb-data
          if [ -n "${BOT_TOKEN}" ]; then printf '%s' "${BOT_TOKEN}" > dist/lb-data/bot-token.txt; fi
          if [ -n "${ANALYTICS_TOKEN}" ]; then printf '%s' "${ANALYTICS_TOKEN}" > dist/lb-data/analytics-token.txt; fi

          tar -C dist -czf dist.tar.gz .

          # Веб-корень Timeweb — public_html в домашней папке аккаунта.
          # Перед заливкой чистим содержимое, чтобы index.htm-заглушка Timeweb
          # не перебивала Vite index.html. ВАЖНО: каталог lb-data НЕ трогаем — в
          # нём лежит JSON глобальной доски рекордов (домашняя папка не пишется,
          # поэтому данные хранятся в webroot и должны пережить деплой).
          #
          # scp/ssh обёрнуты в timeout + ретраи: SSH к Timeweb периодически виснет
          # (удалённая команда стопорится, ServerAlive это не ловит). timeout рвёт
          # зависшую попытку за 120с, до 3 попыток → деплой само-восстанавливается.
          REMOTE_CMD='rm -rf varonia-deploy-tmp && mkdir -p varonia-deploy-tmp public_html && tar -xzf varonia-dist.tar.gz -C varonia-deploy-tmp && find public_html -mindepth 1 -maxdepth 1 ! -name lb-data -exec rm -rf -- {} + && cp -a varonia-deploy-tmp/. public_html/ && rm -rf varonia-deploy-tmp varonia-dist.tar.gz'
          ok=0
          for attempt in 1 2 3; do
            echo "Deploy attempt ${attempt}..."
            if timeout 120 scp ${SCP_OPTS} dist.tar.gz "${SSH_USERNAME}@${SSH_HOST}:varonia-dist.tar.gz" \
               && timeout 120 ssh ${SSH_OPTS} "${SSH_USERNAME}@${SSH_HOST}" "${REMOTE_CMD}"; then
              ok=1; break
            fi
            echo "Attempt ${attempt} failed or timed out, retrying in 5s..."
            sleep 5
          done
          [ "${ok}" = 1 ] || { echo "::error::Deploy failed after 3 attempts (Timeweb SSH)."; exit 1; }

          # Регистрируем вебхук бота (обработчик /start → кнопка «Играть»). Секрет
          # вебхука = первые 32 hex sha256(токена) — тот же расчёт в public/api/bot.php.
          # Идемпотентно: повторный setWebhook на тот же URL безвреден.
          if [ -n "${BOT_TOKEN}" ]; then
            WH_SECRET=$(printf '%s' "${BOT_TOKEN}" | sha256sum | cut -c1-32)
            curl -sS --max-time 20 "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
              --data-urlencode "url=https://cb077728.tw1.ru/api/bot.php" \
              --data-urlencode "secret_token=${WH_SECRET}" \
              --data-urlencode 'allowed_updates=["message"]' >/dev/null \
              && echo "Telegram webhook set (/start → кнопка «Играть»)." \
              || echo "::warning::setWebhook не удался (проверь токен)."
          fi
