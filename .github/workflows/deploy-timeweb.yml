name: Deploy to Timeweb

on:
  push:
    branches:
      - main

concurrency:
  group: 'timeweb'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        # ID счётчика Yandex Metrica не секрет (виден в исходниках страницы),
        # поэтому задаём его прямо здесь. .env локальный и в репозиторий не
        # коммитится, так что прод-сборка должна получить ID отсюда.
        env:
          VITE_YM_ID: "109695119"
          # Безопасный режим (скрыт от игроков): собирает билд без рекламы VPN
          # «Наружу» — например, для модерации Яндекс.Директа.
          # Закомментируйте, чтобы вернуть обычный билд с рекламой.
          # VITE_SAFE_MODE: "1"
        run: npm run build

      - name: Deploy to Timeweb via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || secrets.FTP_SERVER }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME || secrets.FTP_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD || secrets.FTP_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_HOST}" ] || [ -z "${SSH_USERNAME}" ] || [ -z "${SSH_PASSWORD}" ]; then
            echo "::error::Set SSH_HOST, SSH_USERNAME and SSH_PASSWORD repository secrets."
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y sshpass

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          export SSHPASS="${SSH_PASSWORD}"
          SSH_OPTS="-p ${SSH_PORT} -o StrictHostKeyChecking=accept-new"
          SCP_OPTS="-P ${SSH_PORT} -o StrictHostKeyChecking=accept-new"

          tar -C dist -czf dist.tar.gz .
          sshpass -e scp ${SCP_OPTS} dist.tar.gz "${SSH_USERNAME}@${SSH_HOST}:varonia-dist.tar.gz"

          # Веб-корень Timeweb — public_html в домашней папке аккаунта.
          # Перед заливкой чистим содержимое, чтобы index.htm-заглушка Timeweb
          # не перебивала Vite index.html.
          sshpass -e ssh ${SSH_OPTS} "${SSH_USERNAME}@${SSH_HOST}" \
            'rm -rf varonia-deploy-tmp && mkdir -p varonia-deploy-tmp public_html && tar -xzf varonia-dist.tar.gz -C varonia-deploy-tmp && find public_html -mindepth 1 -maxdepth 1 -exec rm -rf -- {} + && cp -a varonia-deploy-tmp/. public_html/ && rm -rf varonia-deploy-tmp varonia-dist.tar.gz'
